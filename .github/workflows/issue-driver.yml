name: Issue-Driven Requirement

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  write-requirement:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Write issue to newquest.md
      run: |
        echo "# ${{ github.event.issue.title }}" > docs/newquest.md
        echo "" >> docs/newquest.md
        echo "${{ github.event.issue.body }}" >> docs/newquest.md

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/newquest.md
        git commit -m "Auto: add requirement from issue #${{ github.event.issue.number }}"
        git push
